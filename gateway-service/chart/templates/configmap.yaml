apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "algorycode-gateway.fullname" . }}-config
  labels:
    {{- include "algorycode-gateway.labels" . | nindent 4 }}
data:
  application.yml: |
    server:
      port: {{ .Values.containerPort }}
    spring:
      application:
        name: {{ .Values.spring.applicationName | quote }}
      cloud:
        discovery:
          enabled: false
        gateway:
          routes:
    {{- range .Values.gateway.routes }}
    {{- $serviceConfig := .service | default dict }}
    {{- $namespace := $serviceConfig.namespace | default $.Release.Namespace }}
    {{- $port := $serviceConfig.port | default 80 }}
    {{- $scheme := $serviceConfig.scheme | default "http" }}
    {{- $clusterDomain := $serviceConfig.clusterDomain | default "cluster.local" }}
    {{- $serviceName := required "gateway.routes[].service.name is required when gateway.routes[].uri is not set" $serviceConfig.name }}
    {{- $uriFromService := printf "%s://%s.%s.svc.%s:%v" $scheme $serviceName $namespace $clusterDomain (int $port) }}
            - id: {{ .id | quote }}
              uri: {{ .uri | default $uriFromService | quote }}
              predicates:
                - {{ printf "Path=%s" .path | quote }}
    {{- end }}
    management:
      endpoints:
        web:
          exposure:
            include: {{ .Values.management.endpointsWebExposureInclude | quote }}
      endpoint:
        health:
          probes:
            enabled: true

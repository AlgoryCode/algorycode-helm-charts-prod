apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: algorycode-rent-service-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AlgoryCode/algorycode-helm-charts-prod.git
    targetRevision: main
    path: rent-service/chart
    helm:
      releaseName: prod-rent
      valueFiles:
        - ../env/prod-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: algory-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
